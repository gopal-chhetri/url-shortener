name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY_OWNER: ${{ vars.REGISTRY_OWNER || 'gopal-chhetri' }}
  IMAGE_NAME: url-shortener

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v ./...

  cd:
    needs: ci
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHA="${GITHUB_SHA:0:7}"
            echo "tag=main-${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/production/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:latest

      - name: Fetch VPS secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ vars.INFISICAL_VPS_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: "prod"
          secret-path: "/"

      - name: Ensure deploy directory permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_SSH_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            APP_DIR="/opt/app/url-shortener"
            sudo mkdir -p "$APP_DIR/deployments/production"
            sudo chown -R "$(whoami):$(whoami)" "$APP_DIR"

      - name: Sync deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_SSH_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "deployments/production/compose.yml,deployments/production/deploy.sh,migrations"
          target: "/opt/app/url-shortener"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_SSH_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          envs: REGISTRY_USERNAME,REGISTRY_PASSWORD
          script: |
            APP_DIR="/opt/app/url-shortener"
            sudo mkdir -p "$APP_DIR/deployments/production"
            sudo chown -R "$(whoami):$(whoami)" "$APP_DIR"
            cd "$APP_DIR/deployments/production"
            echo "$REGISTRY_PASSWORD" | docker login ghcr.io -u "$REGISTRY_USERNAME" --password-stdin
            chmod +x deploy.sh
            IMAGE_TAG="${{ steps.tag.outputs.tag }}"
            export INFISICAL_TOKEN=$(infisical login \
              --method=universal-auth \
              --client-id="${{ secrets.INFISICAL_CLIENT_ID }}" \
              --client-secret="${{ secrets.INFISICAL_CLIENT_SECRET }}" \
              --silent \
              --plain)
            export INFISICAL_PROJECT_ID="${{ vars.INFISICAL_PROJECT_ID }}"
            infisical run --env=prod -- ./deploy.sh "${IMAGE_TAG}"
