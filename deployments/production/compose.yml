services:
  app:
    container_name: url_shortener_app
    image: ghcr.io/${GITHUB_REPOSITORY:-gopal-chhetri/url-shortener}:${IMAGE_TAG:-latest}
    environment:
      - APP_ENV=${APP_ENV}
      - BASE_URL=${BASE_URL}
      - DOMAIN=${DOMAIN}
      - PORT=${PORT:-7500}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - ACCESS_TOKEN_EXPIRY_MINUTE=${ACCESS_TOKEN_EXPIRY_MINUTE}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - REFRESH_TOKEN_EXPIRY_MINUTE=${REFRESH_TOKEN_EXPIRY_MINUTE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-7500}/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network
      # HTTP config
      - traefik.http.routers.url_shortener_http.entrypoints=http
      - traefik.http.routers.url_shortener_http.rule=Host(`${DOMAIN}`)
      # HTTPS config
      - traefik.http.routers.url_shortener_https.entrypoints=https
      - traefik.http.routers.url_shortener_https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.url_shortener_https.tls=true
      - traefik.http.routers.url_shortener_https.tls.certresolver=le
      - traefik.http.routers.url_shortener_https.service=url_shortener_service
      # Service config
      - traefik.http.services.url_shortener_service.loadbalancer.server.port=${PORT:-7500}
      # HTTPS redirect middleware
      - traefik.http.routers.url_shortener_http.middlewares=https-redirect
    networks:
      - traefik-network
      - default

  migrate:
    container_name: url_shortener_migrate
    image: migrate/migrate:v4.19.0
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}?sslmode=disable"
      - "up"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    container_name: url_shortener_db
    image: postgis/postgis:15-3.4-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: url_shortener_redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  traefik-network:
    external: true
