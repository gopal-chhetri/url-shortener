<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <meta name="description" content="The page you're looking for doesn't exist or has been moved." />
  <meta property="og:title" content="Page Not Found" />
  <meta property="og:description" content="The page you're looking for doesn't exist or has been moved." />
  <meta property="og:image" content="/app/logo.png" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="/app/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app/tokens.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--trace);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--muted);
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .trace-line {
      position: fixed;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100dvh;
      background: linear-gradient(to bottom, transparent, var(--trace), transparent);
      opacity: 0.15;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="trace-line"></div>

  <div class="code">404</div>
  <h1>Lost in transit</h1>
  <p>The route you're looking for doesn't exist or has been moved. Even the best links break sometimes.</p>
  <div class="actions">
    <a href="/app/landing.html" class="btn btn-primary" style="padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">Back to Home</a>
    <a href="/app/" class="btn btn-ghost" style="padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">Go to Dashboard</a>
  </div>

</body>
</html>
